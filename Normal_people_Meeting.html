<!DOCTYPE html>
<html lang="ar" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/styles/Normal_people_Meeting.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title> صفحة اجتماع الشخص الطبيعي </title>
</head>

<body>
    <!-- ✅ Navbar -->
    <nav class="navbar">
        <!-- ✅ Right: Logo -->
        <div class="nav-logo">
            <img src="assets/img/logo__5_-removebg-preview.png" class="logo">
        </div>

        <!-- ✅ Center: Links -->
        <ul class="nav-links">
            <li><i class="fa fa-home"></i><a style="text-decoration: none; color: #5b3cc4;"
                    href="./home-page.html">الصفحة
                    الرئيسية</a> </li>
            <li><i class="fa fa-video"></i><a style="text-decoration: none; color: #5b3cc4;"
                    href="./Meeting1_choose_user_type.html">اجتماع</a> </li>
            <li><i class="fa fa-language"></i> <a style="text-decoration: none; color: #5b3cc4;"
                    href="./Translation1_Choosetype_page.html">الترجمة</a></li>
            <li><i class="fa fa-graduation-cap"></i> <a style="text-decoration: none; color: #5b3cc4;"
                    href="./Courses_page.html">الكورسات</a></li>
            <li><i class="fa fa-file-pdf"></i><a style="text-decoration: none; color: #5b3cc4;"
                    href="Pdf_translation_OCR.html">ترجمة
                    pdf</a> </li>
        </ul>

        <!-- ✅ Left: Avatar -->
        <div class="nav-profile">
            <a href="MyAccountPage.html"><img  id="userAvatar" src="assets/img/profileimg.png" class="avatar"></a>
        </div>

    </nav>
    <div class="page">
        <div class="main-new">
            <div class="main-new-header">
                <div class="section back-btn">
                    <button id="button1"><span>عودة ></span></button>
                </div>

                <div class="section title">
                    <h3>Talkable</h3>
                </div>
                <div class="room-pill" id="roomPill" hidden>
                    <span class="room-label">كود الغرفة:</span>
                    <span class="room-code" id="roomCode">---</span>
                    <button class="room-btn" id="copyRoomBtn" type="button">نسخ</button>
                    <button class="room-btn" id="copyRoomLinkBtn" type="button">نسخ الرابط</button>
                </div>

                <div class="toast" id="toast" hidden></div>

                <!-- <a href="" class="meeting-icon">
                        
                      <img src="assets/img/q-m.png" alt="">
                      <img src="assets/img/hand.png" alt=""> 
                        
                     </a>  -->
                <div class="section-end-btn">
                    <button id="endBtnTop" class="ending-but"><span>انهاء</span></button>
                </div>
            </div>




            <!-- Upload Section -->
            <section class="upload-section">
                <!-- Remote (هيشتغل لاحقًا مع WebRTC) -->
                <div class="card video-card" id="remoteCard">
                    <video id="localVideo" autoplay playsinline muted></video>

                </div>

                <!-- Local (الكاميرا هتفتح هنا) -->
                <div class="card video-card" id="localCard">
                    <video id="remoteVideo" autoplay playsinline></video>

                </div>
            </section>

            <nav class="bottom-nav">
                <button id="btnChat" class="nav-btn" type="button">💬</button>
                <button id="btnCaptions" class="nav-btn" type="button">🔤</button>
                <button id="btnSwitch" class="nav-btn" type="button">🔄</button>

                <button id="btnEndBottom" class="nav-btn danger" type="button">⛔</button>

                <button id="btnCam" class="nav-btn" type="button">📷</button>
                <button id="btnMic" class="nav-btn" type="button">🎤</button>
            </nav>

        </div>
        <script src="assets/js/meeting-2.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
        <script src="assets/js/call-signalr.js" defer></script>
</body>

</html>
